name: CI/CD Pipeline

on:
  push:
    branches:
      - main                       

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code                                                #step 1
        uses: actions/checkout@v3

      - name: Login to Docker Hub                                         #step 2
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image                                 #step 3
        uses: docker/build-push-action@v4
        with:
          push: true
          tags: |
            darkphoenix031/hospitality-travel-management-system:latest
            darkphoenix031/hospitality-travel-management-system:${{ github.sha }}

      - name: Deploy to AWS EKS Cluster                                    #step 4                          
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ubuntu
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            kubectl set image deployment/hospitality-app \
              hospitality-app=darkphoenix031/hospitality-travel-management-system:${{ github.sha }}
            kubectl rollout status deployment/hospitality-app